    foam:true, under:true, indoor:false, h24:true, myitem:false, reserve:false, detail:false,
    reviewList:[
      {nick:'야간세차마스터', skill:'mid', stars:4, date:'3주 전',
       text:'새벽에 가도 수압 그대로. 24시간 운영이라 부담없이 타이밍 맞춰서 가기 좋음',
       tags:['24시간','야간OK','깔끔']},
    ]
  }
];

const typeLabel={self:'셀프세차',detail:'디테일링샵',notouch:'무인세차'};
const typeIcon={self:'🚿',detail:'✨',notouch:'🤖'};
const skillLabel={beginner:'🌱세린이',mid:'💨중수',pro:'✨고수',maniac:'🫧세차환자'};

let activeFilter='all', activeId=null, sheetState='peek', sortBy='dist';
let kakaoMap=null, kakaoMarkers={};

// ══════════════════════════════════════════════════
//  카카오 지도 초기화
// ══════════════════════════════════════════════════
function initKakaoMap() {
  if(typeof kakao === 'undefined' || !kakao.maps) { showFallback(); return; }
  const container = document.getElementById('kakaoMap');
  if(!container) return showFallback();

  const options = {
    center: new kakao.maps.LatLng(37.505, 127.040),
    level: 4
  };

  try {
    kakaoMap = new kakao.maps.Map(container, options);
  } catch(e) {
    return showFallback();
  }

  // 지도 이동 시 재검색 버튼 표시
  kakao.maps.event.addListener(kakaoMap, 'dragend', function() {
    document.getElementById('researchBtn').classList.add('show');
  });

  // 지도 클릭 시 상세 닫기
  kakao.maps.event.addListener(kakaoMap, 'click', function() {
    if(activeId) closeDetail();
  });

  renderKakaoMarkers();
}

function showFallback() {
  document.getElementById('kakaoMap').style.display = 'none';
  document.getElementById('mapFallback').style.display = 'flex';
}

// ══════════════════════════════════════════════════
//  물방울 커스텀 마커 HTML
// ══════════════════════════════════════════════════
const markerColors = {
  self:    {bg:'linear-gradient(160deg,#0ea5e9,#22d3ee)', glow:'rgba(14,165,233,.6)'},
  detail:  {bg:'linear-gradient(160deg,#a855f7,#ec4899)', glow:'rgba(168,85,247,.6)'},
  notouch: {bg:'linear-gradient(160deg,#10b981,#34d399)', glow:'rgba(16,185,129,.6)'},
};

function dropMarkerHTML(p, selected) {
  const c = markerColors[p.type];
  const scale = selected ? 'transform:scale(1.28)' : '';
  const glow  = selected ? `filter:drop-shadow(0 0 8px ${c.glow})` : '';
  // 물방울 모양: border-radius 70% 30% 30% 70% / 60% 40% 60% 40%
  return `<div style="display:flex;flex-direction:column;align-items:center;cursor:pointer;${scale};${glow};transition:.25s">
    <div style="width:46px;height:54px;background:${c.bg};border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.45);border:2.5px solid rgba(255,255,255,.35)">
      <span style="font-size:20px">${typeIcon[p.type]}</span>
    </div>
    <div style="margin-top:5px;background:rgba(4,17,30,.93);border:1px solid rgba(14,165,233,.35);padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;backdrop-filter:blur(8px)">
      ${p.name.length>9?p.name.slice(0,9)+'…':p.name}
    </div>
  </div>`;
}

function renderKakaoMarkers() {
  if(!kakaoMap) return;
  Object.values(kakaoMarkers).forEach(m => m.setMap(null));
  kakaoMarkers = {};
  filteredPlaces().forEach(p => {
    const pos = new kakao.maps.LatLng(p.lat, p.lng);
    const content = dropMarkerHTML(p, activeId === p.id);
    const overlay = new kakao.maps.CustomOverlay({
      position: pos,
      content,
      yAnchor: 1.05,
      zIndex: activeId===p.id ? 10 : 1
    });
    overlay.setMap(kakaoMap);
    // 클릭 이벤트는 HTML 내에서 처리
    overlay.getContent = () => content;
    kakaoMarkers[p.id] = overlay;

    // CustomOverlay는 DOM에 직접 접근
    setTimeout(() => {
      const el = overlay.a;
      if(el) el.onclick = () => openDetail(p.id);
    }, 100);
  });
}

function updateMarkerSelected(id) {
  // 마커 재렌더로 선택 상태 반영
  renderKakaoMarkers();
}

function researchArea() {
  document.getElementById('researchBtn').classList.remove('show');
  renderKakaoMarkers(); renderList();
}

// ══════════════════════════════════════════════════
//  필터 / 정렬 / 검색
// ══════════════════════════════════════════════════
document.querySelectorAll('.chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    activeFilter = chip.dataset.f;
    renderList(); renderKakaoMarkers(); closeDetail();
  };
});

const sheet = document.getElementById('sheet');
document.getElementById('sheetHandle').onclick = () => {
  if(sheetState==='collapsed'){sheet.className='sheet peek';sheetState='peek';}
  else if(sheetState==='peek'){sheet.className='sheet full';sheetState='full';}
  else{sheet.className='sheet peek';sheetState='peek';}
};

document.getElementById('sortBtn').onclick = () => {
  sortBy = sortBy==='dist' ? 'rating' : 'dist';
  document.getElementById('sortBtn').textContent = sortBy==='dist' ? '거리순 ▾' : '평점순 ▾';
  renderList();
};

document.getElementById('searchInput').addEventListener('input', e => {
  renderList(e.target.value); renderKakaoMarkers();
});

function filteredPlaces(query='') {
  let list = places;
  if(activeFilter !== 'all') {
    if(['self','detail','notouch'].includes(activeFilter)) list = list.filter(p => p.type===activeFilter);
    else list = list.filter(p => p[activeFilter]);
  }
  const q = query || document.getElementById('searchInput').value;
  if(q) list = list.filter(p => p.name.includes(q) || p.addr.includes(q));
  return [...list].sort((a,b) => sortBy==='dist' ? a.dist-b.dist : b.rating-a.rating);
}

function renderList(query='') {
  const fp = filteredPlaces(query);
  document.getElementById('countNum').textContent = fp.length;
  document.getElementById('placeList').innerHTML = fp.map(p => `
    <div class="place-card ${activeId===p.id?'active':''}" onclick="openDetail(${p.id})">
      <div class="pc-open ${p.open?'yes':'no'}">${p.open?'영업중':'영업종료'}</div>
      <div class="pc-top">
        <div class="pc-icon ${p.type}">${typeIcon[p.type]}</div>
        <div class="pc-info">
          <div class="pc-name">${p.name}</div>
          <div class="pc-addr">${p.addr}</div>
          <div class="pc-meta">
            <span class="pc-stars">★ ${p.rating}</span>
            <span class="pc-reviews">(${p.reviews})</span>
            <span class="pc-dist">${p.dist}km</span>
          </div>
        </div>
      </div>
      <div class="pc-badges">
        ${p.foam?'<span class="badge b">💨 폼건</span>':''}
        ${p.under?'<span class="badge g">⬇️ 하부</span>':''}
        ${p.indoor?'<span class="badge y">🏠 실내베이</span>':''}
        ${p.h24?'<span class="badge g">🕐 24시간</span>':''}
        ${p.myitem?'<span class="badge b">🧴 개인용품</span>':''}
        ${p.reserve?'<span class="badge y">📅 예약가능</span>':''}
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════
//  상세 패널
// ══════════════════════════════════════════════════
function openDetail(id) {
  activeId = id;
  const p = places.find(x => x.id===id);
  if(kakaoMap) {
    kakaoMap.panTo(new kakao.maps.LatLng(p.lat, p.lng));
    renderKakaoMarkers();
  }
  renderList();

  document.getElementById('dpBody').innerHTML = `
    <div class="dp-type-tag">${typeLabel[p.type].toUpperCase()}</div>
    <div class="dp-name">${p.name}</div>
    <div class="dp-addr">📍 ${p.addr}</div>
    <div class="dp-rating-row">
      <div class="dp-score">${p.rating}</div>
      <div>
        <div class="dp-stars-big">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))}</div>
        <div class="dp-rev-count">리뷰 ${p.reviews}개</div>
      </div>
    </div>
    <div class="dp-badges">
      ${p.open?'<span class="badge g">✅ 영업중</span>':'<span class="badge r">⛔ 영업종료</span>'}
      ${p.foam?'<span class="badge b">💨 폼건</span>':''}
      ${p.under?'<span class="badge b">⬇️ 하부세차</span>':''}
      ${p.indoor?'<span class="badge y">🏠 실내베이</span>':''}
      ${p.h24?'<span class="badge g">🕐 24시간</span>':''}
      ${p.myitem?'<span class="badge b">🧴 개인용품OK</span>':''}
      ${p.reserve?'<span class="badge y">📅 예약가능</span>':''}
    </div>
    <div class="dp-actions">
      ${p.reserve?`<button class="dp-btn primary" onclick="alert('예약 기능은 Phase 2에서 오픈 예정!')">📅 예약</button>`:''}
      <button class="dp-btn ghost" onclick="openKakaoNavi(${p.lat},${p.lng},'${p.name}')">🗺️ 길찾기</button>
      <button class="dp-btn ghost" onclick="alert('전화하기 연동 예정')">📞 전화</button>
    </div>
    <div class="dp-section">
      <div class="dp-section-title">시설 정보</div>
      <div class="dp-spec-grid">
        <div class="spec-item"><div class="spec-label">폼건 사용</div><div class="spec-val ${p.foam?'y':'n'}">${p.foam?'✅ 가능':'❌ 불가'}</div></div>
        <div class="spec-item"><div class="spec-label">하부 세차</div><div class="spec-val ${p.under?'y':'n'}">${p.under?'✅ 가능':'❌ 불가'}</div></div>
        <div class="spec-item"><div class="spec-label">실내 베이</div><div class="spec-val ${p.indoor?'y':'n'}">${p.indoor?'✅ 있음':'❌ 없음'}</div></div>
        <div class="spec-item"><div class="spec-label">24시간</div><div class="spec-val ${p.h24?'y':'n'}">${p.h24?'✅ 운영':'❌ 미운영'}</div></div>
        <div class="spec-item"><div class="spec-label">개인용품</div><div class="spec-val ${p.myitem?'y':'n'}">${p.myitem?'✅ 허용':'❌ 불가'}</div></div>
        <div class="spec-item"><div class="spec-label">예약 여부</div><div class="spec-val ${p.reserve?'y':'n'}">${p.reserve?'✅ 가능':'❌ 불가'}</div></div>
      </div>
    </div>
    <div class="dp-section">
      <div class="dp-section-title">빡세 리뷰</div>
      ${p.reviewList.map(r=>`
        <div class="review-item">
          <div class="ri-top">
            <div class="ri-avatar">${r.nick[0]}</div>
            <div class="ri-nick">${r.nick}</div>
            <div class="ri-skill">${skillLabel[r.skill]||''}</div>
            <div class="ri-date">${r.date}</div>
          </div>
          <div class="ri-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
          <div class="ri-text">${r.text}</div>
          <div class="ri-tags">${r.tags.map(t=>`<span class="ri-tag">#${t}</span>`).join('')}</div>
        </div>`).join('')}
      <button class="write-review-btn" onclick="openReviewModal(${p.id})">✏️ 리뷰 작성하기</button>
    </div>`;

  document.getElementById('detailPanel').classList.add('open');
  sheet.className='sheet collapsed'; sheetState='collapsed';
}

function closeDetail() {
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  sheet.className='sheet peek'; sheetState='peek';
  renderList(); renderKakaoMarkers();
}

function openReviewModal(id) {
  const user = JSON.parse(localStorage.getItem('ppaxseUser')||'null');
  if(!user || user.guest) { alert('리뷰 작성은 로그인 후 가능합니다'); location.href='login.html'; return; }
  alert('리뷰 작성 — 커뮤니티 페이지와 연동 예정');
}

// 카카오맵 길찾기
function openKakaoNavi(lat, lng, name) {
  const enc = encodeURIComponent(name);
  // 카카오맵 앱 딥링크 → 웹 fallback
  const appUrl = `kakaomap://route?ep=${lat},${lng}&by=CAR`;
  const webUrl = `https://map.kakao.com/link/to/${enc},${lat},${lng}`;
  window.location.href = appUrl;
  setTimeout(() => window.open(webUrl, '_blank'), 1500);
}

// 현위치 버튼
document.getElementById('locateBtn').onclick = () => {
  navigator.geolocation.getCurrentPosition(
    pos => {
      if(kakaoMap) {
        const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
        kakaoMap.panTo(ll);
        kakaoMap.setLevel(4);
        // 현위치 마커
        new kakao.maps.CustomOverlay({
          position: ll,
          content: `<div style="width:18px;height:18px;border-radius:50%;background:#0ea5e9;border:3px solid #fff;box-shadow:0 0 0 6px rgba(14,165,233,.25)"></div>`,
          zIndex: 99
        }).setMap(kakaoMap);
      } else {
        alert(`현위치: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`);
      }
    },
    () => alert('위치 접근 권한이 필요합니다')
  );
};

// 초기 렌더
renderList();
window.addEventListener('load', initKakaoMap);
</script>
</body>
</html>
